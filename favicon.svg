<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0e1220" />
      <stop offset="100%" stop-color="#060810" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee" />
      <stop offset="100%" stop-color="#a5f3fc" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <rect width="512" height="512" rx="120" fill="url(#bg)" stroke="#1a2035" stroke-width="12" />
  <rect width="488" height="488" x="12" y="12" rx="108" fill="none" stroke="url(#textGrad)" stroke-width="6" opacity="0.4" filter="url(#glow)" />

  <text x="256" y="280" font-family="system-ui, -apple-system, sans-serif" font-size="210" font-weight="900" text-anchor="middle" dominant-baseline="middle" fill="url(#textGrad)" filter="url(#glow)" letter-spacing="-0.04em">MNA</text>
  <text x="256" y="280" font-family="system-ui, -apple-system, sans-serif" font-size="210" font-weight="900" text-anchor="middle" dominant-baseline="middle" fill="#ffffff" letter-spacing="-0.04em">MNA</text>
</svg>
